services:
  - type: web
    name: breathe-esg-api
    env: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: breathe-esg-db
          property: connectionString
databases:
  - name: breathe-esg-db
    databaseName: breathe_esg
    user: breathe_esg
